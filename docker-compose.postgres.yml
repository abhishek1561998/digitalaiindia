services:
  postgres:
    image: postgres:16-alpine
    container_name: digitalaiindia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: digitalaiindia
      POSTGRES_USER: dai_admin
      POSTGRES_PASSWORD: dai_admin_2026_secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dai_admin -d digitalaiindia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
